# =============================================================================
# Pipeline: Promote Power Platform Solutions to Stage and Prod
# =============================================================================
# Manually triggered pipeline that promotes a specific export artifact to
# Stage and then Prod. Run this when you are ready to promote a Test-verified
# release to production environments.
#
# Stage and Prod require manual approval — configure approval checks on the
# corresponding ADO environments:
#   - "Power Platform Stage" → add approval gate
#   - "Power Platform Prod"  → add approval gate
#
# How to use:
#   1. Go to Pipelines in Azure DevOps and run this pipeline manually
#   2. In the "Resources" panel, select the export-solutions run to promote
#   3. Approve each environment when prompted
#
# Prerequisites:
#   1. Power Platform Build Tools extension installed in the ADO org
#   2. ADO Environments created:
#      - "Power Platform Stage"  (with approval check)
#      - "Power Platform Prod"   (with approval check)
#   3. Variable groups per environment containing:
#      - EnvironmentUrl  : Dataverse environment URL
#      - ClientId        : Service Principal Application (Client) ID
#      - ClientSecret    : Service Principal Client Secret (mark as secret)
#      - TenantId        : Azure AD Tenant ID
#      Groups: PowerPlatform-Stage, PowerPlatform-Prod
#   4. The export-solutions pipeline publishes an artifact named
#      "ManagedSolutions" containing build.json and *_version.zip files
# =============================================================================

parameters:
  - name: dryRun
    displayName: "Dry run (validate without deploying)"
    type: boolean
    default: false

trigger: none

resources:
  pipelines:
    - pipeline: ExportPipeline
      source: "export-solutions"
      trigger: none

pool:
  vmImage: "windows-latest"

stages:
  # ===========================================================================
  # SetBuildName — tag this run with the export branch name for traceability
  # ===========================================================================
  - stage: SetBuildName
    displayName: "Set build name"
    jobs:
      - job: SetName
        displayName: "Tag run with export branch"
        pool:
          vmImage: "windows-latest"
        steps:
          - pwsh: |
              $runName = "$(resources.pipeline.ExportPipeline.runName)"
              if ($runName) {
                Write-Host "##vso[build.updatebuildnumber]$runName"
                Write-Host "##vso[build.addbuildtag]$runName"
              }
            displayName: "Set build name from export pipeline"

  # ===========================================================================
  # Stage — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-environment.yml
    parameters:
      stageName: Stage
      displayName: "Deploy to Stage"
      environmentName: "Power Platform Stage"
      variableGroup: "PowerPlatform-Stage"
      dependsOn: SetBuildName
      dryRun: ${{ parameters.dryRun }}

  # ===========================================================================
  # Prod — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-environment.yml
    parameters:
      stageName: Prod
      displayName: "Deploy to Prod"
      environmentName: "Power Platform Prod"
      variableGroup: "PowerPlatform-Prod"
      dependsOn: Stage
      dryRun: ${{ parameters.dryRun }}
