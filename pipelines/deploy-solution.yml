# =============================================================================
# Pipeline: Deploy Solution (Dev → QA → Stage → Prod)
# =============================================================================
# Automatically triggered when the "Export Solution from Pre-Dev" pipeline
# completes successfully. Can also be run manually.
#
# Multi-stage pipeline that deploys a single managed solution through all
# environments in sequence. Dev deploys automatically; QA, Stage, and Prod
# require manual approval — configure approval checks on the corresponding
# ADO environments:
#   - "Power Platform QA"    → add approval gate
#   - "Power Platform Stage" → add approval gate
#   - "Power Platform Prod"  → add approval gate
#
# Auto-triggered: Downloads the managed solution artifact published by the
#                 export pipeline and imports it through all stages.
#
# Manual run:     Requires the solutionName parameter. Imports
#                 solutions/managed/{solutionName}.zip through all stages.
#
# Prerequisites:
#   1. ADO Environments created:
#      - "Power Platform Dev"     (no approval check)
#      - "Power Platform QA"      (with approval check)
#      - "Power Platform Stage"   (with approval check)
#      - "Power Platform Prod"    (with approval check)
#   3. Variable groups per environment containing:
#      - EnvironmentUrl  : Dataverse environment URL
#      - ClientId        : Service Principal Application (Client) ID
#      - ClientSecret    : Service Principal Client Secret (mark as secret)
#      - TenantId        : Azure AD Tenant ID
#      Groups: PowerPlatform-Dev, PowerPlatform-QA, PowerPlatform-Stage,
#              PowerPlatform-Prod
#   4. The export-solution-predev pipeline publishes an artifact named
#      "ManagedSolution" containing the managed solution zip
# =============================================================================

trigger: none

# -----------------------------------------------------------------------------
# Pipeline resource: triggers this pipeline when the export pipeline completes
# -----------------------------------------------------------------------------
# IMPORTANT: The 'source' value must match the name of the export pipeline as
# it appears in Azure DevOps (Pipelines > All Pipelines). If you renamed the
# pipeline in the ADO UI, update the source value to match.
# -----------------------------------------------------------------------------
resources:
  pipelines:
    - pipeline: exportSolution
      source: "Export Solution from Pre-Dev"
      trigger:
        branches:
          include:
            - main

# -----------------------------------------------------------------------------
# Parameters: For manual runs only
# -----------------------------------------------------------------------------
parameters:
  - name: solutionName
    displayName: "Solution name (required for manual runs, ignored for auto-triggered)"
    type: string
    default: ""
  - name: dryRun
    displayName: "Dry run (validate only — no imports, no config data upserts)"
    type: boolean
    default: false

pool:
  vmImage: "windows-latest"

stages:
  # ===========================================================================
  # Dev — Deploys automatically (no approval required)
  # ===========================================================================
  - stage: Dev
    displayName: "Deploy to Dev"
    variables:
      - group: PowerPlatform-Dev
    jobs:
      - deployment: Deploy
        displayName: "Deploy solution to Dev"
        environment: "Power Platform Dev"
        strategy:
          runOnce:
            deploy:
              steps:
                # ===============================================================
                # Checkout repository (needed for manual runs)
                # ===============================================================
                - checkout: self

                # ===============================================================
                # Download managed solution artifact (auto-triggered runs only)
                # Skips gracefully on manual runs — continueOnError lets the
                # resolve step fall back to the repo path when no artifact exists.
                # ===============================================================
                - download: exportSolution
                  artifact: ManagedSolution
                  displayName: "Download managed solution from export pipeline"
                  continueOnError: true

                # ===============================================================
                # Install pac CLI
                # ===============================================================
                - pwsh: dotnet tool install --global Microsoft.PowerApps.CLI.Tool
                  displayName: "Install pac CLI"

                # ===============================================================
                # Authenticate pac CLI with Dev environment
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    Write-Host "Authenticating with: $(EnvironmentUrl)"

                    pac auth create `
                      --environment "$(EnvironmentUrl)" `
                      --applicationId "$(ClientId)" `
                      --clientSecret "$(ClientSecret)" `
                      --tenant "$(TenantId)"

                    if ($LASTEXITCODE -ne 0) {
                      Write-Error "Failed to authenticate with Power Platform"
                      exit 1
                    }

                    Write-Host "Successfully authenticated."
                    pac auth list
                  displayName: "Authenticate with Power Platform"
                  env:
                    ClientSecret: $(ClientSecret)

                # ===============================================================
                # Resolve the managed solution file path
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    # -----------------------------------------------------------
                    # Determine source: artifact (auto-triggered) or repo (manual)
                    # Check for the artifact directory rather than Build.Reason —
                    # Build.Reason is unreliable inside deployment jobs.
                    # -----------------------------------------------------------
                    $artifactDir = "$(Pipeline.Workspace)/exportSolution/ManagedSolution"

                    if (Test-Path $artifactDir) {
                      # Auto-triggered: find the zip in the downloaded artifact
                      Write-Host "Looking for managed solution in artifact: $artifactDir"

                      $zips = Get-ChildItem -Path $artifactDir -Filter "*.zip" -ErrorAction SilentlyContinue

                      if (-not $zips -or $zips.Count -eq 0) {
                        Write-Error "No solution zip found in artifact directory: $artifactDir"
                        exit 1
                      }

                      $solutionZip = $zips[0].FullName
                      $solutionName = [System.IO.Path]::GetFileNameWithoutExtension($solutionZip)
                      Write-Host "Found solution artifact: $solutionZip"

                    } else {
                      # Manual run: use the repo path based on parameter
                      $solutionName = "${{ parameters.solutionName }}"

                      if (-not $solutionName) {
                        Write-Error "The solutionName parameter is required for manual runs."
                        exit 1
                      }

                      $solutionZip = "$(Build.SourcesDirectory)/solutions/managed/$solutionName.zip"
                      Write-Host "Using managed solution from repo: $solutionZip"

                      if (-not (Test-Path $solutionZip)) {
                        Write-Error "Managed solution not found: $solutionZip. Run the export pipeline first or verify the solution name."
                        exit 1
                      }
                    }

                    Write-Host ""
                    Write-Host "============================================"
                    Write-Host "  Deploying to Dev: $solutionName"
                    Write-Host "  Solution zip:     $solutionZip"
                    Write-Host "============================================"

                    # Check for deployment settings file
                    if (Test-Path $artifactDir) {
                      $settingsPath = Join-Path (Split-Path $solutionZip) "deploymentSettings_Dev.json"
                    } else {
                      $settingsPath = "$(Build.SourcesDirectory)/deploymentSettings/preDev/deploymentSettings_Dev.json"
                    }

                    if (Test-Path $settingsPath) {
                      Write-Host "Deployment settings found: $settingsPath"
                      Write-Host "##vso[task.setvariable variable=HasDeploymentSettings]true"
                      Write-Host "##vso[task.setvariable variable=DeploymentSettingsPath]$settingsPath"
                    } else {
                      Write-Host "No deployment settings file found — importing without settings."
                      Write-Host "##vso[task.setvariable variable=HasDeploymentSettings]false"
                    }

                    Write-Host "##vso[task.setvariable variable=SolutionZipPath]$solutionZip"
                    Write-Host "##vso[task.setvariable variable=SolutionName]$solutionName"
                  displayName: "Resolve solution file path"

                # ===============================================================
                # Import managed solution into Dev
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    $dryRun = "${{ parameters.dryRun }}" -eq "True"

                    if ($dryRun) {
                      Write-Host ""
                      Write-Host "============================================"
                      Write-Host "  DRY RUN MODE — no changes will be made"
                      Write-Host "============================================"
                      Write-Host ""
                    }

                    $solutionName = "$(SolutionName)"
                    $solutionZip  = "$(SolutionZipPath)"

                    # Strip version suffix from filename to get base solution name
                    # e.g., "MySolution_1.2.3.4" → "MySolution"
                    $baseSolutionName = $solutionName -replace '_\d+\.\d+\.\d+\.\d+$', ''

                    # Read isRollback from build.json if available
                    $isRollback = $false
                    $buildJsonPath = "$(Pipeline.Workspace)/exportSolution/ManagedSolution/build.json"
                    if (Test-Path $buildJsonPath) {
                      try {
                        $buildConfig   = Get-Content $buildJsonPath -Raw | ConvertFrom-Json
                        $solutionEntry = $buildConfig.solutions | Where-Object { $_.name -eq $baseSolutionName } | Select-Object -First 1
                        if ($solutionEntry -and $solutionEntry.PSObject.Properties['isRollback']) {
                          $isRollback = [bool]$solutionEntry.isRollback
                        }
                      } catch {
                        Write-Host "##vso[task.logissue type=warning]Could not read build.json for isRollback flag: $_"
                      }
                    }

                    if ($isRollback) {
                      Write-Host "isRollback = true — staged upgrade will NOT be used; importing without version guard to allow lower version."
                    }

                    Write-Host "Checking solution: $baseSolutionName"

                    # -----------------------------------------------------------
                    # Extract target version from the solution zip
                    # -----------------------------------------------------------
                    $targetVersion = $null
                    try {
                      Add-Type -Assembly System.IO.Compression.FileSystem
                      $zip = [System.IO.Compression.ZipFile]::OpenRead($solutionZip)
                      try {
                        $entry = $zip.Entries | Where-Object { $_.FullName -eq "Other/Solution.xml" } | Select-Object -First 1
                        if ($entry) {
                          $reader = [System.IO.StreamReader]::new($entry.Open())
                          $solutionXml = [xml]$reader.ReadToEnd()
                          $reader.Dispose()
                          $targetVersion = $solutionXml.ImportExportXml.SolutionManifest.Version
                        }
                      } finally {
                        $zip.Dispose()
                      }
                    } catch {
                      Write-Host "##vso[task.logissue type=warning]Could not read solution version from zip: $_"
                    }

                    if ($targetVersion) {
                      Write-Host "Target version: $targetVersion"
                    } else {
                      Write-Host "Could not determine target version — proceeding with import."
                    }

                    # -----------------------------------------------------------
                    # Query installed solutions and determine import mode
                    # -----------------------------------------------------------
                    $isInstalled = $false

                    if ($targetVersion) {
                      Write-Host "`nQuerying installed solutions in Dev environment..."
                      $listJson = (pac solution list --json) | Out-String

                      if ($LASTEXITCODE -eq 0) {
                        $installedList = @($listJson | ConvertFrom-Json)
                        $installedMap  = @{}
                        foreach ($s in $installedList) {
                          $key = if ($s.PSObject.Properties['solutionUniqueName']) { $s.solutionUniqueName } else { $s.uniqueName }
                          $ver = if ($s.PSObject.Properties['version']) { $s.version } else { $s.versionNumber }
                          if ($key) { $installedMap[$key] = $ver }
                        }

                        if ($installedMap.ContainsKey($baseSolutionName)) {
                          $installedVersion = $installedMap[$baseSolutionName]
                          if ($installedVersion -eq $targetVersion) {
                            Write-Host ""
                            Write-Host "============================================"
                            Write-Host "  Already at target version — skipping"
                            Write-Host "============================================"
                            Write-Host "Solution '$baseSolutionName' is already at v$targetVersion in Dev."
                            exit 0
                          }
                          # Skip if installed is higher and this is not a rollback
                          try {
                            if (([Version]$installedVersion) -gt ([Version]$targetVersion) -and -not $isRollback) {
                              Write-Host "Installed v$installedVersion is higher than target v$targetVersion — skipping (not a rollback)."
                              exit 0
                            }
                          } catch {
                            Write-Host "##vso[task.logissue type=warning]Could not compare versions — proceeding with import."
                          }
                          if ($isRollback) {
                            Write-Host "Installed: v$installedVersion — rolling back to v$targetVersion (isRollback=true)"
                          } else {
                            Write-Host "Installed: v$installedVersion — will upgrade to v$targetVersion"
                          }
                          $isInstalled = $true
                        } else {
                          Write-Host "Solution not currently installed — fresh install."
                        }
                      } else {
                        Write-Host "##vso[task.logissue type=warning]Could not query installed solutions — proceeding with import."
                      }
                    }

                    Write-Host ""
                    Write-Host "============================================"
                    Write-Host "  Deploying to Dev: $baseSolutionName"
                    Write-Host "  Solution zip:     $solutionZip"
                    Write-Host "============================================"

                    # -----------------------------------------------------------
                    # Build import args based on install state
                    # -----------------------------------------------------------
                    $importArgs = @(
                      "solution", "import",
                      "--path", $solutionZip,
                      "--activate-plugins"
                    )

                    if ($isInstalled -and -not $isRollback) {
                      # Upgrading an existing solution — use staged upgrade
                      $importArgs += "--stage-and-upgrade"
                      $importArgs += "--skip-lower-version"
                      $importArgs += "--async"
                      $importArgs += "--max-async-wait-time"
                      $importArgs += "60"
                    } elseif ($isInstalled -and $isRollback) {
                      # Rolling back — plain import without version guard, but still async
                      $importArgs += "--async"
                      $importArgs += "--max-async-wait-time"
                      $importArgs += "60"
                    }

                    if ("$(HasDeploymentSettings)" -eq "true") {
                      Write-Host "Using deployment settings: $(DeploymentSettingsPath)"
                      $importArgs += @("--settings-file", "$(DeploymentSettingsPath)")
                    }

                    if ($dryRun) {
                      Write-Host "[DRY RUN] Would execute: pac $($importArgs -join ' ')"
                    } else {
                      & pac @importArgs

                      if ($LASTEXITCODE -ne 0) {
                        Write-Error "Failed to import solution: $baseSolutionName"
                        exit 1
                      }
                    }

                    Write-Host ""
                    Write-Host "============================================"
                    if ($dryRun) {
                      Write-Host "  DRY RUN Complete"
                    } else {
                      Write-Host "  Deployment Complete"
                    }
                    Write-Host "============================================"
                    if ($dryRun) {
                      Write-Host "[DRY RUN] Would import '$baseSolutionName' into the Dev environment."
                    } else {
                      Write-Host "Solution '$baseSolutionName' has been imported"
                      Write-Host "into the Dev environment as managed."
                      Write-Host ""
                      Write-Host "Verify in the Power Platform Admin Center or"
                      Write-Host "maker portal that the solution is present and"
                      Write-Host "functioning as expected."
                    }
                  displayName: "Import managed solution to Dev"
                  env:
                    ClientSecret: $(ClientSecret)

                # ===============================================================
                # Upsert config data (if build.json has configData)
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    $dryRun = "${{ parameters.dryRun }}" -eq "True"
                    if ($dryRun) {
                      Write-Host "[DRY RUN] Skipping config data upsert."
                      exit 0
                    }

                    # Locate build.json — auto-triggered has it in the artifact,
                    # manual runs may not have it at all (single solution deploy)
                    $buildJsonPath = $null
                    $candidatePath = "$(Pipeline.Workspace)/exportSolution/ManagedSolution/build.json"
                    if (Test-Path $candidatePath) {
                      $buildJsonPath = $candidatePath
                    }

                    if (-not $buildJsonPath) {
                      # For manual runs, check the repo for an exports/sample/build.json
                      # (or the user may not have configData — skip gracefully)
                      Write-Host "No build.json found in artifact — skipping config data upsert."
                      exit 0
                    }

                    $buildConfig = Get-Content $buildJsonPath -Raw | ConvertFrom-Json
                    if (-not $buildConfig.PSObject.Properties["configData"] -or $buildConfig.configData.Count -eq 0) {
                      Write-Host "No configData defined in build.json — skipping."
                      exit 0
                    }

                    $configData = @($buildConfig.configData)
                    $envUrl = "$(EnvironmentUrl)".TrimEnd("/")

                    # Acquire OAuth token
                    $tokenUrl = "https://login.microsoftonline.com/$(TenantId)/oauth2/v2.0/token"
                    $tokenBody = @{
                      grant_type    = "client_credentials"
                      client_id     = "$(ClientId)"
                      client_secret = $env:ClientSecret
                      scope         = "$envUrl/.default"
                    }

                    $tokenResponse = Invoke-RestMethod -Uri $tokenUrl -Method Post -Body $tokenBody
                    $apiHeaders = @{
                      "Authorization"    = "Bearer $($tokenResponse.access_token)"
                      "OData-MaxVersion" = "4.0"
                      "OData-Version"    = "4.0"
                      "Content-Type"     = "application/json"
                      "Accept"           = "application/json"
                    }

                    # Resolve data files from the artifact directory
                    $artifactDir = Split-Path $buildJsonPath -Parent
                    $syncScript = "$(Build.SourcesDirectory)/scripts/Sync-ConfigData.ps1"
                    & $syncScript `
                      -Mode Upsert `
                      -ConfigData $configData `
                      -EnvironmentUrl $envUrl `
                      -ApiHeaders $apiHeaders `
                      -SourceDir $artifactDir
                  displayName: "Upsert config data"
                  env:
                    ClientSecret: $(ClientSecret)

                # ===============================================================
                # Stage solution artifact for downstream stages
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    $stagingDir = "$(Build.ArtifactStagingDirectory)/DeploySolution"
                    New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

                    Copy-Item -Path "$(SolutionZipPath)" -Destination $stagingDir
                    Write-Host "Staged solution for downstream stages: $(SolutionZipPath)"

                    # Also stage build.json and config data files if available (for downstream config data upsert)
                    $artifactDir = "$(Pipeline.Workspace)/exportSolution/ManagedSolution"
                    if (Test-Path $artifactDir) {
                      $buildJsonSrc = Join-Path $artifactDir "build.json"
                      if (Test-Path $buildJsonSrc) {
                        Copy-Item -Path $buildJsonSrc -Destination "$stagingDir/build.json"
                        Write-Host "Staged build.json for downstream stages"

                        # Stage config data files
                        $buildConfig = Get-Content $buildJsonSrc -Raw | ConvertFrom-Json
                        if ($buildConfig.PSObject.Properties["configData"]) {
                          foreach ($ds in $buildConfig.configData) {
                            $dataFileSrc = Join-Path $artifactDir $ds.dataFile
                            if (Test-Path $dataFileSrc) {
                              $destDir = Join-Path $stagingDir (Split-Path $ds.dataFile -Parent)
                              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
                              Copy-Item -Path $dataFileSrc -Destination (Join-Path $stagingDir $ds.dataFile)
                              Write-Host "Staged config data: $($ds.dataFile)"
                            }
                          }
                        }
                      }
                    }
                  displayName: "Stage solution for downstream stages"

                - task: PublishPipelineArtifact@1
                  displayName: "Publish solution for downstream stages"
                  inputs:
                    targetPath: $(Build.ArtifactStagingDirectory)/DeploySolution
                    artifact: DeploySolution

  # ===========================================================================
  # QA — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-single-solution.yml
    parameters:
      stageName: QA
      displayName: "Deploy to QA"
      environmentName: "Power Platform QA with Approval"
      variableGroup: "PowerPlatform-QA"
      dependsOn: Dev
      dryRun: ${{ parameters.dryRun }}

  # ===========================================================================
  # Stage — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-single-solution.yml
    parameters:
      stageName: Stage
      displayName: "Deploy to Stage"
      environmentName: "Power Platform Stage"
      variableGroup: "PowerPlatform-Stage"
      dependsOn: QA
      dryRun: ${{ parameters.dryRun }}

  # ===========================================================================
  # Prod — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-single-solution.yml
    parameters:
      stageName: Prod
      displayName: "Deploy to Prod"
      environmentName: "Power Platform Prod"
      variableGroup: "PowerPlatform-Prod"
      dependsOn: Stage
      dryRun: ${{ parameters.dryRun }}
