# =============================================================================
# Pipeline: Deploy Power Platform Solutions to an ad-hoc environment
# =============================================================================
# Manually triggered. Select any completed export-solutions run as the source,
# then specify the target ADO Environment and variable group to deploy into.
#
# Use this pipeline to deploy to environments outside the standard
# QA → Stage → Prod release chain (e.g., sandbox, UAT, hotfix).
#
# Prerequisites:
#   1. The ADO Environment named below must exist in your ADO project
#   2. A library variable group matching the name below must exist, containing:
#      - EnvironmentUrl  : Dataverse environment URL
#      - ClientId        : Service Principal Application (Client) ID
#      - ClientSecret    : Service Principal Client Secret (mark as secret)
#      - TenantId        : Azure AD Tenant ID
# =============================================================================

parameters:
  - name: environmentName
    displayName: "ADO Environment name (e.g., Power Platform Sandbox)"
    type: string
  - name: variableGroup
    displayName: "Variable group name (e.g., PowerPlatform-Sandbox)"
    type: string

trigger: none

resources:
  pipelines:
    - pipeline: ExportPipeline
      source: "export-solutions"
      trigger: none

pool:
  vmImage: "windows-latest"

variables:
  - name: dryRun
    value: "false"

stages:
  - template: templates/deploy-environment.yml
    parameters:
      stageName: Deploy
      displayName: "Deploy to ${{ parameters.environmentName }}"
      environmentName: ${{ parameters.environmentName }}
      variableGroup: ${{ parameters.variableGroup }}
      settingsKey: ${{ parameters.variableGroup }}
