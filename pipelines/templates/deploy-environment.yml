# =============================================================================
# Template: Deploy Power Platform Solutions to a single environment (deploy-environment)
# =============================================================================
# Reusable environment template used by release-solutions.yml.
# Deploys managed solutions in the order defined in build.json, skipping any
# that are already installed at the target version.
#
# Required variable group keys: EnvironmentUrl, ClientId, ClientSecret, TenantId
# =============================================================================

parameters:
  - name: stageName
    type: string
  - name: displayName
    type: string
  - name: environmentName
    type: string
  - name: variableGroup
    type: string
  - name: dependsOn
    type: string
    default: ""
  - name: dryRun
    type: boolean
    default: false

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    ${{ if eq(parameters.dependsOn, '') }}:
      dependsOn: []
    ${{ else }}:
      dependsOn: ${{ parameters.dependsOn }}
    variables:
      - group: ${{ parameters.variableGroup }}
    jobs:
      - deployment: Deploy
        displayName: "Deploy solutions to ${{ parameters.stageName }}"
        environment: ${{ parameters.environmentName }}
        strategy:
          runOnce:
            deploy:
              steps:
                # ===============================================================
                # Download managed solution artifacts from the export pipeline
                # ===============================================================
                - download: ExportPipeline
                  artifact: ManagedSolutions
                  displayName: "Download managed solution artifacts"

                # ===============================================================
                # Install Power Platform Build Tools
                # ===============================================================
                - task: PowerPlatformToolInstaller@2
                  displayName: "Install Power Platform Build Tools"

                # ===============================================================
                # Install pac CLI
                # ===============================================================
                - pwsh: dotnet tool install --global Microsoft.PowerApps.CLI.Tool
                  displayName: "Install pac CLI"

                # ===============================================================
                # Authenticate pac CLI with target environment
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    Write-Host "Authenticating with: $(EnvironmentUrl)"

                    pac auth create `
                      --environment "$(EnvironmentUrl)" `
                      --applicationId "$(ClientId)" `
                      --clientSecret "$(ClientSecret)" `
                      --tenant "$(TenantId)"

                    if ($LASTEXITCODE -ne 0) {
                      Write-Error "Failed to authenticate with Power Platform"
                      exit 1
                    }

                    Write-Host "Successfully authenticated."
                    pac auth list
                  displayName: "Authenticate with Power Platform"
                  env:
                    ClientSecret: $(ClientSecret)

                # ===============================================================
                # Checkout repository (for scripts and deployment settings)
                # ===============================================================
                - checkout: self

                # ===============================================================
                # Deploy solutions in build.json order
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    $dryRun = "${{ parameters.dryRun }}" -eq "True"

                    if ($dryRun) {
                      Write-Host ""
                      Write-Host "============================================"
                      Write-Host "  DRY RUN MODE — no changes will be made"
                      Write-Host "============================================"
                      Write-Host ""
                    }

                    # -----------------------------------------------------------
                    # Read build.json from artifact
                    # -----------------------------------------------------------
                    $artifactDir = "$(Pipeline.Workspace)/ExportPipeline/ManagedSolutions"
                    $buildJsonPath = Join-Path $artifactDir "build.json"

                    if (-not (Test-Path $buildJsonPath)) {
                      Write-Error "build.json not found in artifact at: $buildJsonPath"
                      exit 1
                    }

                    $buildConfig = Get-Content $buildJsonPath -Raw | ConvertFrom-Json
                    $solutions = $buildConfig.solutions

                    if (-not $solutions -or $solutions.Count -eq 0) {
                      Write-Error "No solutions specified in build.json"
                      exit 1
                    }

                    Write-Host "Solutions to deploy ($($solutions.Count)):"
                    foreach ($s in $solutions) {
                      Write-Host "  - $($s.name) (v$($s.version))"
                    }

                    # -----------------------------------------------------------
                    # Validate all artifacts exist before importing anything
                    # -----------------------------------------------------------
                    Write-Host "`nValidating all solution artifacts..."
                    $missingArtifacts = @()

                    foreach ($solution in $solutions) {
                      $name    = $solution.name
                      $version = $solution.version
                      $zipPath = Join-Path $artifactDir "${name}_${version}.zip"

                      if (-not (Test-Path $zipPath)) {
                        Write-Host "  MISSING: ${name}_${version}.zip"
                        $missingArtifacts += "${name}_${version}.zip"
                      } else {
                        Write-Host "  OK:      ${name}_${version}.zip"
                      }

                      # Also validate deployment settings file if required
                      $includeSettings = $false
                      if ($solution.PSObject.Properties["includeDeploymentSettings"]) {
                        $includeSettings = [bool]$solution.includeDeploymentSettings
                      }

                      if ($includeSettings) {
                        $settingsFile = Join-Path $artifactDir "deploymentSettings_${{ parameters.stageName }}.json"
                        if (-not (Test-Path $settingsFile)) {
                          Write-Host "  MISSING: deploymentSettings_${{ parameters.stageName }}.json (required by $name)"
                          $missingArtifacts += "deploymentSettings_${{ parameters.stageName }}.json"
                        } else {
                          Write-Host "  OK:      deploymentSettings_${{ parameters.stageName }}.json"
                        }
                      }
                    }

                    if ($missingArtifacts.Count -gt 0) {
                      Write-Host ""
                      Write-Error "Artifact validation failed — $($missingArtifacts.Count) file(s) missing. No solutions were imported."
                      foreach ($m in $missingArtifacts) {
                        Write-Host "  - $m"
                      }
                      exit 1
                    }

                    Write-Host "All artifacts validated successfully."

                    # -----------------------------------------------------------
                    # Query installed solutions from the target environment
                    # -----------------------------------------------------------
                    Write-Host "`nQuerying installed solutions in target environment..."
                    # Capture only stdout so stderr warnings don't corrupt the JSON
                    $listJson = (pac solution list --json) | Out-String

                    if ($LASTEXITCODE -ne 0) {
                      Write-Error "Failed to list solutions in target environment"
                      Write-Host $listJson
                      exit 1
                    }

                    $installedList = @($listJson | ConvertFrom-Json)
                    $installed = @{}
                    foreach ($s in $installedList) {
                      # pac v2 uses 'solutionUniqueName'; fall back to 'uniqueName' for older versions
                      $key = if ($s.PSObject.Properties['solutionUniqueName']) { $s.solutionUniqueName }
                             else { $s.uniqueName }
                      $ver = if ($s.PSObject.Properties['version']) { $s.version }
                             else { $s.versionNumber }
                      if ($key) { $installed[$key] = $ver }
                    }

                    Write-Host "Found $($installed.Count) solutions in target environment."
                    foreach ($key in $installed.Keys) {
                      Write-Host "  $key = v$($installed[$key])"
                    }
                    Write-Host ""

                    # -----------------------------------------------------------
                    # Deploy each solution in order
                    # -----------------------------------------------------------
                    $failedSolutions = @()
                    $skippedSolutions = @()
                    $deployedSolutions = @()
                    $flowWarnings = @()

                    # -----------------------------------------------------------
                    # Acquire OAuth token for Dataverse API (used for flow activation)
                    # -----------------------------------------------------------
                    $tokenUrl = "https://login.microsoftonline.com/$(TenantId)/oauth2/v2.0/token"
                    $tokenBody = @{
                      grant_type    = "client_credentials"
                      client_id     = "$(ClientId)"
                      client_secret = $env:ClientSecret
                      scope         = "$(EnvironmentUrl)/.default"
                    }

                    try {
                      $tokenResponse = Invoke-RestMethod -Uri $tokenUrl -Method Post -Body $tokenBody
                      $apiHeaders = @{
                        "Authorization"  = "Bearer $($tokenResponse.access_token)"
                        "OData-MaxVersion" = "4.0"
                        "OData-Version"    = "4.0"
                        "Content-Type"     = "application/json"
                        "Accept"           = "application/json"
                      }
                      $hasApiToken = $true
                      Write-Host "Acquired Dataverse API token for flow activation."
                    } catch {
                      $hasApiToken = $false
                      Write-Host "##vso[task.logissue type=warning]Could not acquire Dataverse API token for flow activation: $_"
                      Write-Host "Cloud flow activation will be skipped."
                    }

                    foreach ($solution in $solutions) {
                      $name    = $solution.name
                      $version = $solution.version
                      $zipPath = Join-Path $artifactDir "${name}_${version}.zip"

                      Write-Host ""
                      Write-Host "============================================"
                      Write-Host "  Solution: $name (v$version)"
                      Write-Host "============================================"

                      # Read isRollback flag from build.json solution entry
                      $isRollback = $false
                      if ($solution.PSObject.Properties['isRollback']) {
                        $isRollback = [bool]$solution.isRollback
                      }
                      if ($isRollback) {
                        Write-Host "  isRollback = true — staged upgrade will NOT be used; importing without version guard to allow lower version."
                      }

                      # Check if already installed at this version
                      $isUpgrade = $false
                      if ($installed.ContainsKey($name)) {
                        $installedVersion = $installed[$name]
                        if ($installedVersion -eq $version) {
                          Write-Host "  Already installed at v$version — skipping."
                          $skippedSolutions += $name
                          continue
                        }

                        # Compare versions: if installed is higher and this is not a rollback, skip
                        try {
                          if (([Version]$installedVersion) -gt ([Version]$version) -and -not $isRollback) {
                            Write-Host "  Installed v$installedVersion is higher than target v$version — skipping (not a rollback)."
                            $skippedSolutions += $name
                            continue
                          }
                        } catch {
                          Write-Host "##vso[task.logissue type=warning]Could not compare versions '$installedVersion' and '$version' — proceeding with import."
                        }

                        if ($isRollback) {
                          Write-Host "  Currently installed: v$installedVersion — rolling back to v$version (isRollback=true)"
                        } else {
                          Write-Host "  Currently installed: v$installedVersion — upgrading to v$version"
                        }
                        $isUpgrade = $true
                      } else {
                        Write-Host "  Not currently installed — fresh install"
                      }

                      # Import managed solution
                      Write-Host "  Importing managed solution..."

                      # Use --stage-and-upgrade only when upgrading; fresh installs don't have
                      # a base solution to hold against and will fail with ImportAsHolding.
                      $importArgs = @(
                        "solution", "import",
                        "--path", $zipPath,
                        "--activate-plugins"
                      )
                      if ($isUpgrade -and -not $isRollback) {
                        $importArgs += "--stage-and-upgrade"
                        $importArgs += "--skip-lower-version"
                        $importArgs += "--async"
                        $importArgs += "--max-async-wait-time"
                        $importArgs += "60"
                      } elseif ($isUpgrade -and $isRollback) {
                        # Rolling back — plain import without version guard, but still async
                        $importArgs += "--async"
                        $importArgs += "--max-async-wait-time"
                        $importArgs += "60"
                      }

                      $includeSettings = $false
                      if ($solution.PSObject.Properties["includeDeploymentSettings"]) {
                        $includeSettings = [bool]$solution.includeDeploymentSettings
                      }

                      if ($includeSettings) {
                        $settingsFile = Join-Path $artifactDir "deploymentSettings_${{ parameters.stageName }}.json"
                        Write-Host "  Using deployment settings: deploymentSettings_${{ parameters.stageName }}.json"
                        $importArgs += @("--settings-file", $settingsFile)
                      }

                      if ($dryRun) {
                        Write-Host "  [DRY RUN] Would execute: pac $($importArgs -join ' ')"
                        $deployedSolutions += $name
                      } else {
                        & pac @importArgs

                        if ($LASTEXITCODE -ne 0) {
                          Write-Error "Failed to import solution: $name"
                          $failedSolutions += $name
                          continue
                        }

                        Write-Host "  Successfully deployed."
                        $deployedSolutions += $name
                      }

                      # ---------------------------------------------------------
                      # Activate cloud flows if this solution includes them
                      # ---------------------------------------------------------
                      $hasCloudFlows = $false
                      if ($solution.PSObject.Properties["includesCloudFlows"]) {
                        $hasCloudFlows = [bool]$solution.includesCloudFlows
                      }

                      if ($hasCloudFlows -and $hasApiToken -and -not $dryRun) {
                        Write-Host "  Checking cloud flow statuses..."
                        $envUrl = "$(EnvironmentUrl)".TrimEnd("/")

                        try {
                          # Find solution ID by unique name
                          $solQuery = "$envUrl/api/data/v9.2/solutions?`$filter=uniquename eq '$name'&`$select=solutionid"
                          $solResult = Invoke-RestMethod -Uri $solQuery -Headers $apiHeaders
                          $solutionId = $solResult.value[0].solutionid

                          # Get workflow component IDs (componenttype 29 = Workflow/Process)
                          $compQuery = "$envUrl/api/data/v9.2/solutioncomponents?`$filter=_solutionid_value eq $solutionId and componenttype eq 29&`$select=objectid"
                          $compResult = Invoke-RestMethod -Uri $compQuery -Headers $apiHeaders
                          $workflowIds = @($compResult.value | ForEach-Object { $_.objectid })

                          if ($workflowIds.Count -eq 0) {
                            Write-Host "    No workflow components found in solution."
                          } else {
                            Write-Host "    Found $($workflowIds.Count) workflow component(s). Checking for inactive cloud flows..."
                            $activatedCount = 0

                            foreach ($wfId in $workflowIds) {
                              try {
                                $wfQuery = "$envUrl/api/data/v9.2/workflows($wfId)?`$select=name,category,statecode"
                                $wf = Invoke-RestMethod -Uri $wfQuery -Headers $apiHeaders

                                # Only process cloud flows (category 5) that are not activated (statecode != 1)
                                if ($wf.category -ne 5) { continue }
                                if ($wf.statecode -eq 1) {
                                  Write-Host "    Flow '$($wf.name)' is already on."
                                  continue
                                }

                                Write-Host "    Flow '$($wf.name)' is off (statecode=$($wf.statecode)). Attempting to activate..."
                                $activateBody = '{"statecode": 1}'
                                Invoke-RestMethod -Uri "$envUrl/api/data/v9.2/workflows($wfId)" -Method Patch -Headers $apiHeaders -Body $activateBody
                                Write-Host "    Flow '$($wf.name)' activated successfully."
                                $activatedCount++
                              } catch {
                                $errorMsg = $_.Exception.Message
                                $flowDisplayName = if ($wf -and $wf.name) { $wf.name } else { $wfId }
                                Write-Host "##vso[task.logissue type=warning]Failed to activate flow '$flowDisplayName': $errorMsg"
                                $flowWarnings += @{
                                  Solution = $name
                                  Flow     = $flowDisplayName
                                  Error    = $errorMsg
                                }
                              }
                            }

                            if ($activatedCount -gt 0) {
                              Write-Host "    Activated $activatedCount cloud flow(s)."
                            }
                          }
                        } catch {
                          Write-Host "##vso[task.logissue type=warning]Failed to check/activate cloud flows for '$name': $($_.Exception.Message)"
                          $flowWarnings += @{
                            Solution = $name
                            Flow     = "(all)"
                            Error    = $_.Exception.Message
                          }
                        }
                      }
                    }

                    # -----------------------------------------------------------
                    # Summary
                    # -----------------------------------------------------------
                    Write-Host ""
                    Write-Host "============================================"
                    if ($dryRun) {
                      Write-Host "  DRY RUN Summary — ${{ parameters.stageName }}"
                    } else {
                      Write-Host "  Deployment Summary — ${{ parameters.stageName }}"
                    }
                    Write-Host "============================================"
                    if ($dryRun) { Write-Host "  Mode: DRY RUN — no imports were performed" }
                    Write-Host "Total solutions: $($solutions.Count)"
                    if ($dryRun) {
                      Write-Host "Would deploy:    $($deployedSolutions.Count)"
                    } else {
                      Write-Host "Deployed:        $($deployedSolutions.Count)"
                    }
                    Write-Host "Skipped:         $($skippedSolutions.Count)"
                    Write-Host "Failed:          $($failedSolutions.Count)"

                    if ($skippedSolutions.Count -gt 0) {
                      Write-Host "Skipped (already at target version): $($skippedSolutions -join ', ')"
                    }

                    if ($flowWarnings.Count -gt 0) {
                      Write-Host ""
                      Write-Host "Cloud flow activation warnings: $($flowWarnings.Count)"
                      foreach ($fw in $flowWarnings) {
                        Write-Host "  - [$($fw.Solution)] Flow '$($fw.Flow)': $($fw.Error)"
                      }
                    }

                    if ($failedSolutions.Count -gt 0) {
                      Write-Host "Failed solutions: $($failedSolutions -join ', ')"
                      Write-Error "One or more solutions failed to deploy"
                      exit 1
                    }

                    Write-Host "`nAll solutions deployed successfully to ${{ parameters.stageName }}."
                  displayName: "Deploy solutions"
                  env:
                    ClientSecret: $(ClientSecret)

                # ===============================================================
                # Upsert configuration data (if configData defined in build.json)
                # ===============================================================
                - pwsh: |
                    $ErrorActionPreference = "Stop"

                    $dryRun = "${{ parameters.dryRun }}" -eq "True"
                    if ($dryRun) {
                      Write-Host "[DRY RUN] Skipping config data upsert."
                      exit 0
                    }

                    $artifactDir = "$(Pipeline.Workspace)/ExportPipeline/ManagedSolutions"
                    $buildJsonPath = Join-Path $artifactDir "build.json"
                    $buildConfig = Get-Content $buildJsonPath -Raw | ConvertFrom-Json

                    if (-not $buildConfig.PSObject.Properties["configData"] -or $buildConfig.configData.Count -eq 0) {
                      Write-Host "No configData defined in build.json — skipping."
                      exit 0
                    }

                    $configData = @($buildConfig.configData)
                    $envUrl = "$(EnvironmentUrl)".TrimEnd("/")

                    # Acquire OAuth token
                    $tokenUrl = "https://login.microsoftonline.com/$(TenantId)/oauth2/v2.0/token"
                    $tokenBody = @{
                      grant_type    = "client_credentials"
                      client_id     = "$(ClientId)"
                      client_secret = $env:ClientSecret
                      scope         = "$envUrl/.default"
                    }

                    $tokenResponse = Invoke-RestMethod -Uri $tokenUrl -Method Post -Body $tokenBody
                    $apiHeaders = @{
                      "Authorization"    = "Bearer $($tokenResponse.access_token)"
                      "OData-MaxVersion" = "4.0"
                      "OData-Version"    = "4.0"
                      "Content-Type"     = "application/json"
                      "Accept"           = "application/json"
                    }

                    # Resolve data files from the artifact
                    $syncScript = "$(Build.SourcesDirectory)/scripts/Sync-ConfigData.ps1"
                    & $syncScript `
                      -Mode Upsert `
                      -ConfigData $configData `
                      -EnvironmentUrl $envUrl `
                      -ApiHeaders $apiHeaders `
                      -SourceDir $artifactDir
                  displayName: "Upsert config data"
                  env:
                    ClientSecret: $(ClientSecret)
