# =============================================================================
# Pipeline: Export Solution from Pre-Dev (On-Demand)
# =============================================================================
# Manually triggered pipeline that exports a single solution from the Pre-Dev
# environment, unpacks it into source control, and packs it as managed.
#
# On successful completion this pipeline automatically triggers the
# deploy-solution-dev pipeline which imports the managed solution into Dev.
#
# Prerequisites:
#   1. Power Platform Build Tools extension installed in the ADO org
#   2. A Power Platform SPN service connection for the Pre-Dev environment
#      (configured under Project Settings > Service Connections)
#   3. Build Service account has "Contribute" permission on the repository
#
# No secret pipeline variables are required - authentication is handled
# entirely through the service connection.
# =============================================================================

trigger: none

# -----------------------------------------------------------------------------
# Parameters: Configurable in the ADO UI when running manually
# -----------------------------------------------------------------------------
parameters:
  - name: solutionName
    displayName: "Solution unique name (as it appears in Power Platform)"
    type: string

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
variables:
  # Name of the Power Platform SPN service connection for the Pre-Dev
  # environment. Create this under Project Settings > Service Connections >
  # Power Platform (using Application ID / Client Secret authentication).
  - name: PreDevServiceConnection
    value: "PowerPlatformPreDev"

pool:
  vmImage: "windows-latest"

steps:
  # ===========================================================================
  # Step 1: Checkout repository with persist credentials (needed for push)
  # ===========================================================================
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  # ===========================================================================
  # Step 2: Install Power Platform Build Tools
  # ===========================================================================
  - task: PowerPlatformToolInstaller@2
    displayName: "Install Power Platform Build Tools"

  # ===========================================================================
  # Step 3: Ensure output directories exist
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $dirs = @(
        "$(Build.SourcesDirectory)/solutions/unmanaged",
        "$(Build.SourcesDirectory)/solutions/unpacked",
        "$(Build.SourcesDirectory)/solutions/managed"
      )

      foreach ($dir in $dirs) {
        New-Item -ItemType Directory -Path $dir -Force | Out-Null
        Write-Host "Ensured directory exists: $dir"
      }
    displayName: "Create output directories"

  # ===========================================================================
  # Step 4: Export unmanaged solution from Pre-Dev
  # ===========================================================================
  - task: PowerPlatformExportSolution@2
    displayName: "Export unmanaged solution from Pre-Dev"
    inputs:
      authenticationType: PowerPlatformSPN
      PowerPlatformSPN: $(PreDevServiceConnection)
      SolutionName: ${{ parameters.solutionName }}
      SolutionOutputFile: $(Build.SourcesDirectory)/solutions/unmanaged/${{ parameters.solutionName }}.zip
      Managed: false
      AsyncOperation: true
      MaxAsyncWaitTime: 60

  # ===========================================================================
  # Step 5: Clean unpack the exported solution
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"
      $unpackDir = "$(Build.SourcesDirectory)/solutions/unpacked/${{ parameters.solutionName }}"

      if (Test-Path $unpackDir) {
        Write-Host "Removing existing unpacked folder: $unpackDir"
        Remove-Item -Path $unpackDir -Recurse -Force
      }
    displayName: "Clean existing unpack folder"

  - task: PowerPlatformUnpackSolution@2
    displayName: "Unpack solution"
    inputs:
      SolutionInputFile: $(Build.SourcesDirectory)/solutions/unmanaged/${{ parameters.solutionName }}.zip
      SolutionTargetFolder: $(Build.SourcesDirectory)/solutions/unpacked/${{ parameters.solutionName }}
      SolutionType: Unmanaged
      ProcessCanvasApps: true

  # ===========================================================================
  # Step 6: Pack as managed solution
  # ===========================================================================
  - task: PowerPlatformPackSolution@2
    displayName: "Pack managed solution"
    inputs:
      SolutionSourceFolder: $(Build.SourcesDirectory)/solutions/unpacked/${{ parameters.solutionName }}
      SolutionTargetFolder: $(Build.SourcesDirectory)/solutions/managed/${{ parameters.solutionName }}.zip
      SolutionType: Managed
      ProcessCanvasApps: true

  # ===========================================================================
  # Step 7: Commit and push solution files to the repository
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      git config user.email "pipeline@dev.azure.com"
      git config user.name "Azure DevOps Pipeline"

      # Stage all solution files
      git add solutions/

      # Check for changes
      $status = git status --porcelain solutions/
      if (-not $status) {
        Write-Host "No changes detected in solutions/ directory. Skipping commit."
        exit 0
      }

      Write-Host "Changes detected:"
      git status --short solutions/

      # Commit and push
      $commitMsg = "chore: export ${{ parameters.solutionName }} from Pre-Dev"
      git commit -m "$commitMsg"

      git push

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to push changes"
        exit 1
      }

      Write-Host "Changes committed and pushed."
    displayName: "Commit and push solution files"

  # ===========================================================================
  # Step 8: Stage artifacts (managed solution + deployment settings)
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $managedZip = "$(Build.SourcesDirectory)/solutions/managed/${{ parameters.solutionName }}.zip"
      $stagingDir = "$(Build.ArtifactStagingDirectory)"

      # Copy managed solution zip
      Copy-Item -Path $managedZip -Destination "$stagingDir/${{ parameters.solutionName }}.zip"
      Write-Host "Staged managed solution: ${{ parameters.solutionName }}.zip"

      # Copy deployment settings for Dev (if exists in root)
      $settingsFile = "$(Build.SourcesDirectory)/deploymentSettings/deploymentSettings_Dev.json"
      if (Test-Path $settingsFile) {
        Copy-Item -Path $settingsFile -Destination "$stagingDir/deploymentSettings_Dev.json"
        Write-Host "Staged deployment settings: deploymentSettings_Dev.json"
      } else {
        Write-Host "No deploymentSettings_Dev.json found in root — skipping."
      }
    displayName: "Stage artifacts"

  # ===========================================================================
  # Step 9: Publish managed solution as pipeline artifact
  #         (consumed by the deploy-solution-dev pipeline)
  # ===========================================================================
  - task: PublishPipelineArtifact@1
    displayName: "Publish managed solution artifact"
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)
      artifact: ManagedSolution
