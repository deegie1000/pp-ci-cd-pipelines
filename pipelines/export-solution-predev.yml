# =============================================================================
# Pipeline: Export Solution from Pre-Dev (On-Demand)
# =============================================================================
# Manually triggered pipeline that exports a single solution from the Pre-Dev
# environment, unpacks it into source control, and publishes it as managed.
#
# On successful completion this pipeline automatically triggers the
# deploy-solution pipeline which imports the managed solution into Dev.
# For promotion to QA, Stage, and Prod, use the release-adhoc pipeline.
#
# Prerequisites:
#   1. Power Platform Build Tools extension installed in the ADO org
#   2. Variable group PowerPlatform-PreDev containing:
#      - EnvironmentUrl  : Pre-Dev environment URL
#      - ClientId        : Service Principal Application (Client) ID
#      - ClientSecret    : Service Principal Client Secret (mark as secret)
#      - TenantId        : Azure AD Tenant ID
#   3. Build Service account has "Contribute" and "Create Pull Request"
#      permissions on the repository
# =============================================================================

trigger: none

# -----------------------------------------------------------------------------
# Parameters: Configurable in the ADO UI when running manually
# -----------------------------------------------------------------------------
parameters:
  - name: solutionName
    displayName: "Solution unique name (as it appears in Power Platform)"
    type: string

# -----------------------------------------------------------------------------
# Variables
# -----------------------------------------------------------------------------
variables:
  - group: PowerPlatform-PreDev

pool:
  vmImage: "windows-latest"

steps:
  # ===========================================================================
  # Step 1: Checkout repository with persist credentials (needed for push)
  # ===========================================================================
  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  # ===========================================================================
  # Step 2: Install pac CLI
  # ===========================================================================
  - pwsh: dotnet tool install --global Microsoft.PowerApps.CLI.Tool
    displayName: "Install pac CLI"

  # ===========================================================================
  # Step 3: Ensure output directories exist
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $dirs = @(
        "$(Build.SourcesDirectory)/solutions/unmanaged",
        "$(Build.SourcesDirectory)/solutions/unpacked",
        "$(Build.SourcesDirectory)/solutions/managed"
      )

      foreach ($dir in $dirs) {
        New-Item -ItemType Directory -Path $dir -Force | Out-Null
        Write-Host "Ensured directory exists: $dir"
      }
    displayName: "Create output directories"

  # ===========================================================================
  # Step 4: Authenticate pac CLI with Pre-Dev environment
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      Write-Host "Authenticating with: $(EnvironmentUrl)"

      pac auth create `
        --environment "$(EnvironmentUrl)" `
        --applicationId "$(ClientId)" `
        --clientSecret "$(ClientSecret)" `
        --tenant "$(TenantId)"

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to authenticate with Power Platform"
        exit 1
      }

      Write-Host "Successfully authenticated."
      pac auth list
    displayName: "Authenticate with Power Platform"
    env:
      ClientSecret: $(ClientSecret)

  # ===========================================================================
  # Step 5: Export unmanaged solution from Pre-Dev
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $unmanagedZip = "$(Build.SourcesDirectory)/solutions/unmanaged/${{ parameters.solutionName }}.zip"
      Write-Host "Exporting unmanaged solution: ${{ parameters.solutionName }}"
      Write-Host "  Target: $unmanagedZip"

      pac solution export `
        --name "${{ parameters.solutionName }}" `
        --path $unmanagedZip `
        --overwrite

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to export solution: ${{ parameters.solutionName }}"
        exit 1
      }

      Write-Host "Unmanaged export complete."
    displayName: "Export unmanaged solution from Pre-Dev"

  # ===========================================================================
  # Step 6: Clean unpack the exported solution
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $unmanagedZip = "$(Build.SourcesDirectory)/solutions/unmanaged/${{ parameters.solutionName }}.zip"
      $unpackDir    = "$(Build.SourcesDirectory)/solutions/unpacked/${{ parameters.solutionName }}"

      if (Test-Path $unpackDir) {
        Write-Host "Removing existing unpacked folder: $unpackDir"
        Remove-Item -Path $unpackDir -Recurse -Force
      }

      pac solution unpack `
        --zipfile $unmanagedZip `
        --folder $unpackDir `
        --allowDelete true `
        --allowWrite true

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to unpack solution: ${{ parameters.solutionName }}"
        exit 1
      }

      Write-Host "Unpack complete: $unpackDir"

      # Read solution version from unpacked Solution.xml
      $solutionXmlPath = "$unpackDir/Other/Solution.xml"
      if (-not (Test-Path $solutionXmlPath)) {
        Write-Error "Solution.xml not found at: $solutionXmlPath"
        exit 1
      }
      [xml]$solutionXml = Get-Content $solutionXmlPath
      $version = $solutionXml.ImportExportXml.SolutionManifest.Version
      Write-Host "Solution version: $version"
      Write-Host "##vso[task.setvariable variable=SolutionVersion]$version"

      # Rename unmanaged zip to include version
      $versionedUnmanagedZip = "$(Build.SourcesDirectory)/solutions/unmanaged/${{ parameters.solutionName }}_${version}.zip"
      Move-Item -Path $unmanagedZip -Destination $versionedUnmanagedZip -Force
      Write-Host "Renamed unmanaged zip: $versionedUnmanagedZip"
    displayName: "Unpack solution"

  # ===========================================================================
  # Step 7: Export managed solution directly from Pre-Dev
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $managedZip = "$(Build.SourcesDirectory)/solutions/managed/${{ parameters.solutionName }}_$(SolutionVersion).zip"
      Write-Host "Exporting managed solution: ${{ parameters.solutionName }}"
      Write-Host "  Target: $managedZip"

      pac solution export `
        --name "${{ parameters.solutionName }}" `
        --path $managedZip `
        --managed `
        --overwrite

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to export managed solution: ${{ parameters.solutionName }}"
        exit 1
      }

      Write-Host "Managed export complete."
    displayName: "Export managed solution from Pre-Dev"

  # ===========================================================================
  # Step 8: Create export branch, commit, and push solution files
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      git config user.email "pipeline@dev.azure.com"
      git config user.name "Azure DevOps Pipeline"

      # Stage all solution files
      git add solutions/

      # Check for changes
      $status = git status --porcelain solutions/
      if (-not $status) {
        Write-Host "No changes detected in solutions/ directory. Skipping commit and PR."
        Write-Host "##vso[task.setvariable variable=HasChanges]false"
        exit 0
      }

      Write-Host "Changes detected:"
      git status --short solutions/

      # Create a timestamped export branch
      $timestamp    = Get-Date -Format "yyyy-MM-dd-HHmmss"
      $exportBranch = "export/predev/$timestamp"

      Write-Host "Creating branch: $exportBranch"
      git checkout -b $exportBranch

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to create branch: $exportBranch"
        exit 1
      }

      # Commit
      $commitMsg = "chore: export ${{ parameters.solutionName }} from Pre-Dev"
      git commit -m $commitMsg

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to commit changes"
        exit 1
      }

      # Push the new branch to origin
      git push origin $exportBranch

      if ($LASTEXITCODE -ne 0) {
        Write-Error "Failed to push branch: $exportBranch"
        exit 1
      }

      Write-Host "Changes committed and pushed to $exportBranch"
      Write-Host "##vso[task.setvariable variable=ExportBranch]$exportBranch"
      Write-Host "##vso[task.setvariable variable=HasChanges]true"
    displayName: "Create export branch and push solution files"

  # ===========================================================================
  # Step 9: Create Pull Request to main with squash merge, delete source branch
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $orgUrl  = "$(System.TeamFoundationCollectionUri)"
      $project = "$(System.TeamProject)"
      $repoId  = "$(Build.Repository.ID)"
      $token   = $env:SYSTEM_ACCESSTOKEN

      $headers = @{
        "Authorization" = "Bearer $token"
        "Content-Type"  = "application/json"
      }

      $description = (
        "## Automated Solution Export (Pre-Dev)`n`n" +
        "**Solution:** ``${{ parameters.solutionName }}```n" +
        "**Branch:**   ``$(ExportBranch)```n`n" +
        "---`n" +
        "*This PR was created automatically by the export-solution-predev pipeline.*"
      )

      $prBody = @{
        sourceRefName = "refs/heads/$(ExportBranch)"
        targetRefName = "refs/heads/main"
        title         = "Export ${{ parameters.solutionName }} from Pre-Dev [$(ExportBranch)]"
        description   = $description
      } | ConvertTo-Json -Depth 5

      $createUrl = "${orgUrl}${project}/_apis/git/repositories/${repoId}/pullrequests?api-version=7.1"
      Write-Host "Creating Pull Request..."

      try {
        $pr   = Invoke-RestMethod -Uri $createUrl -Method Post -Headers $headers -Body $prBody
        $prId = $pr.pullRequestId
        Write-Host "Pull Request created: PR #${prId}"
      } catch {
        Write-Error "Failed to create Pull Request: $_"
        exit 1
      }

      $updateUrl = "${orgUrl}${project}/_apis/git/repositories/${repoId}/pullrequests/${prId}?api-version=7.1"

      # -----------------------------------------------------------------------
      # Attempt to approve the PR (build service identity)
      # Must happen before auto-complete so the PR is still active
      # -----------------------------------------------------------------------
      Write-Host "`nAttempting to approve PR..."
      $approveBody = @{ vote = 10 } | ConvertTo-Json
      $reviewerUrl = "${orgUrl}${project}/_apis/git/repositories/${repoId}/pullrequests/${prId}/reviewers/$($pr.createdBy.id)?api-version=7.1"

      try {
        Invoke-RestMethod -Uri $reviewerUrl -Method Put -Headers $headers -Body $approveBody | Out-Null
        Write-Host "PR #${prId} approved."
      } catch {
        Write-Host "##vso[task.logissue type=warning]Could not auto-approve PR #${prId}: $_"
      }

      # -----------------------------------------------------------------------
      # Set auto-complete with squash merge
      # -----------------------------------------------------------------------
      Write-Host "`nSetting PR to auto-complete..."
      $mergeMsg     = "chore: export ${{ parameters.solutionName }} from Pre-Dev [$(ExportBranch)]"
      $completeBody = @{
        autoCompleteSetBy = @{ id = $pr.createdBy.id }
        completionOptions = @{
          deleteSourceBranch = $true
          mergeStrategy      = "squash"
          mergeCommitMessage = $mergeMsg
        }
      } | ConvertTo-Json -Depth 5

      try {
        Invoke-RestMethod -Uri $updateUrl -Method Patch -Headers $headers -Body $completeBody | Out-Null
        Write-Host "PR #${prId} set to auto-complete."
      } catch {
        Write-Host "##vso[task.logissue type=warning]Could not set auto-complete on PR #${prId}: $_"
      }

      # -----------------------------------------------------------------------
      # Attempt to complete (merge) the PR directly
      # -----------------------------------------------------------------------
      Write-Host "`nAttempting to complete (merge) PR..."
      $mergeBody = @{
        status                = "completed"
        lastMergeSourceCommit = $pr.lastMergeSourceCommit
        completionOptions     = @{
          deleteSourceBranch = $true
          mergeStrategy      = "squash"
          mergeCommitMessage = $mergeMsg
        }
      } | ConvertTo-Json -Depth 5

      try {
        Invoke-RestMethod -Uri $updateUrl -Method Patch -Headers $headers -Body $mergeBody | Out-Null
        Write-Host "PR #${prId} completed and merged into main."
      } catch {
        Write-Host "##vso[task.logissue type=warning]Could not auto-complete PR #${prId}: $_"
        Write-Host "The PR has been set to auto-complete and will merge once all policies are met."
      }

      # -----------------------------------------------------------------------
      # Explicitly delete the source branch via refs API
      # (completionOptions.deleteSourceBranch is unreliable in some ADO versions)
      # -----------------------------------------------------------------------
      Write-Host "`nDeleting source branch: $(ExportBranch)..."

      try {
        $refsUrl   = "${orgUrl}${project}/_apis/git/repositories/${repoId}/refs?filter=heads/$(ExportBranch)&api-version=7.1"
        $branchRef = Invoke-RestMethod -Uri $refsUrl -Method Get -Headers $headers
        if ($branchRef.value -and $branchRef.value.Count -gt 0) {
          $deleteBody = @(
            @{
              name        = "refs/heads/$(ExportBranch)"
              oldObjectId = $branchRef.value[0].objectId
              newObjectId = "0000000000000000000000000000000000000000"
            }
          ) | ConvertTo-Json
          Invoke-RestMethod -Uri "${orgUrl}${project}/_apis/git/repositories/${repoId}/refs?api-version=7.1" `
            -Method Post -Headers $headers -Body $deleteBody | Out-Null
          Write-Host "Source branch deleted: $(ExportBranch)"
        } else {
          Write-Host "Branch not found (may have already been deleted): $(ExportBranch)"
        }
      } catch {
        Write-Host "##vso[task.logissue type=warning]Could not delete source branch $(ExportBranch): $_"
      }

      Write-Host "`nPull Request processing complete."
    displayName: "Create and merge Pull Request"
    condition: and(succeeded(), eq(variables['HasChanges'], 'true'))
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)

  # ===========================================================================
  # Step 10: Stage artifacts (managed solution + preDev deployment settings)
  # ===========================================================================
  - pwsh: |
      $ErrorActionPreference = "Stop"

      $managedZip = "$(Build.SourcesDirectory)/solutions/managed/${{ parameters.solutionName }}_$(SolutionVersion).zip"
      $stagingDir = "$(Build.ArtifactStagingDirectory)"

      # Copy managed solution zip
      Copy-Item -Path $managedZip -Destination "$stagingDir/${{ parameters.solutionName }}_$(SolutionVersion).zip"
      Write-Host "Staged managed solution: ${{ parameters.solutionName }}_$(SolutionVersion).zip"

      # Copy all deployment settings from deploymentSettings/preDev/
      $preDev = "$(Build.SourcesDirectory)/deploymentSettings/preDev"
      if (Test-Path $preDev) {
        $settingsFiles = Get-ChildItem -Path $preDev -Filter "deploymentSettings_*.json" -ErrorAction SilentlyContinue
        if ($settingsFiles) {
          foreach ($sf in $settingsFiles) {
            Copy-Item -Path $sf.FullName -Destination "$stagingDir/$($sf.Name)"
            Write-Host "Staged deployment settings: $($sf.Name)"
          }
        } else {
          Write-Host "No deployment settings files found in deploymentSettings/preDev/ — skipping."
        }
      } else {
        Write-Host "No deploymentSettings/preDev folder found — skipping settings staging."
      }
    displayName: "Stage artifacts"

  # ===========================================================================
  # Step 11: Publish managed solution as pipeline artifact
  #          (consumed by the deploy-solution pipeline for Dev deployment)
  # ===========================================================================
  - task: PublishPipelineArtifact@1
    displayName: "Publish managed solution artifact"
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)
      artifact: ManagedSolution
