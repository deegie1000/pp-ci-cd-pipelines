# =============================================================================
# Pipeline: Release Power Platform Solutions (QA -> Stage -> Prod)
# =============================================================================
# Triggers automatically when the daily export pipeline completes.
# Deploys managed solutions through three environments in sequence.
#
# When the export pipeline was triggered from a Dataverse Export Request,
# build.json will contain an exportRequestId. Each stage updates the
# corresponding deploy status fields on the Export Request record so users
# can track progress from the model-driven app.
#
# QA deploys automatically. Stage and Prod require manual approval — configure
# approval checks on the corresponding ADO environments:
#   - "Power Platform Stage" → add approval gate
#   - "Power Platform Prod"  → add approval gate
#
# Prerequisites:
#   1. Power Platform Build Tools extension installed in the ADO org
#   2. ADO Environments created:
#      - "Power Platform QA"
#      - "Power Platform Stage"  (with approval check)
#      - "Power Platform Prod"   (with approval check)
#   3. Variable groups per environment containing:
#      - EnvironmentUrl  : Dataverse environment URL
#      - ClientId        : Service Principal Application (Client) ID
#      - ClientSecret    : Service Principal Client Secret (mark as secret)
#      - TenantId        : Azure AD Tenant ID
#      Groups: PowerPlatform-QA, PowerPlatform-Stage, PowerPlatform-Prod
#   4. Each variable group should also include (for Dataverse status updates):
#      - AdminClientSecret : Client secret for the Dev/admin environment
#      (or link the PowerPlatform-Admin variable group)
#   5. The export-solutions pipeline publishes an artifact named
#      "ManagedSolutions" containing build.json and *_version.zip files
# =============================================================================

trigger: none

resources:
  pipelines:
    - pipeline: ExportPipeline
      source: "export-solutions"
      trigger:
        branches:
          include:
            - main

# -----------------------------------------------------------------------------
# Pipeline-level variables for Dataverse Export Request status tracking.
# These point to the Dev environment where the Export Request tables live.
# The service principal must have read/write access to the custom tables.
# -----------------------------------------------------------------------------
variables:
  # URL of the Dataverse environment containing Export Request tables
  # (typically the Dev environment)
  - name: AdminEnvironmentUrl
    value: "https://yourorg.crm.dynamics.com"

  # Service principal credentials for the admin/Dev environment.
  # If these match the Dev variable group credentials, you can reference
  # the same values. If different, set them here or in a shared variable group.
  - name: AdminClientId
    value: "$(AdminClientId)"    # Set in pipeline UI or variable group
  - name: AdminTenantId
    value: "$(AdminTenantId)"    # Set in pipeline UI or variable group

  # AdminClientSecret should be configured as a secret variable in the
  # pipeline UI, or linked from a variable group. Each environment variable
  # group should include AdminClientSecret if it's the same across environments.

pool:
  vmImage: "windows-latest"

stages:
  # ===========================================================================
  # QA — Deploys automatically when the export pipeline completes
  # ===========================================================================
  - template: templates/deploy-environment.yml
    parameters:
      stageName: QA
      displayName: "Deploy to QA"
      environmentName: "Power Platform QA"
      variableGroup: "PowerPlatform-QA"
      # Dataverse status tracking
      adminEnvironmentUrl: $(AdminEnvironmentUrl)
      adminClientId: $(AdminClientId)
      adminTenantId: $(AdminTenantId)
      dataverseStatusField: "cr_qadeploystatus"
      dataverseCompletedField: "cr_qacompletedon"

  # ===========================================================================
  # Stage — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-environment.yml
    parameters:
      stageName: Stage
      displayName: "Deploy to Stage"
      environmentName: "Power Platform Stage"
      variableGroup: "PowerPlatform-Stage"
      dependsOn: QA
      # Dataverse status tracking
      adminEnvironmentUrl: $(AdminEnvironmentUrl)
      adminClientId: $(AdminClientId)
      adminTenantId: $(AdminTenantId)
      dataverseStatusField: "cr_stagedeploystatus"
      dataverseCompletedField: "cr_stagecompletedon"

  # ===========================================================================
  # Prod — Requires manual approval (configure on the ADO environment)
  # ===========================================================================
  - template: templates/deploy-environment.yml
    parameters:
      stageName: Prod
      displayName: "Deploy to Prod"
      environmentName: "Power Platform Prod"
      variableGroup: "PowerPlatform-Prod"
      dependsOn: Stage
      # Dataverse status tracking
      adminEnvironmentUrl: $(AdminEnvironmentUrl)
      adminClientId: $(AdminClientId)
      adminTenantId: $(AdminTenantId)
      dataverseStatusField: "cr_proddeploystatus"
      dataverseCompletedField: "cr_prodcompletedon"
